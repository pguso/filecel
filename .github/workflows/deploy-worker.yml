name: Deploy Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/worker/**"
      - "packages/r2/**"
      - "package-lock.json"

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -f apps/worker/Dockerfile -t filecel-worker:ci .

      - name: Smoke test container startup
        run: |
          docker run -d --name filecel-worker-smoke \
            -e WORKER_API_SECRET=test-secret \
            -e REDIS_URL=redis://127.0.0.1:6379 \
            -e R2_ACCOUNT_ID=test \
            -e R2_ACCESS_KEY_ID=test \
            -e R2_SECRET_ACCESS_KEY=test \
            -e R2_BUCKET=test \
            -e FRAMEUNIVERSE_API_URL=https://frameuniverse.example.com \
            -e FILECEL_WEBHOOK_SECRET=test \
            -p 3000:3000 \
            filecel-worker:ci || true
          sleep 2
          docker logs filecel-worker-smoke || true
          docker rm -f filecel-worker-smoke || true

