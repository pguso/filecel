name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build

  integration:
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:3.7
        ports:
          - 4566:4566
        env:
          SERVICES: s3
          AWS_DEFAULT_REGION: us-east-1
    env:
      RUN_INTEGRATION: "1"
      LOCALSTACK_ENDPOINT: http://127.0.0.1:4566
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Wait for LocalStack S3
        run: |
          for i in $(seq 1 30); do
            curl -sf "http://127.0.0.1:4566/_localstack/health" && break
            sleep 2
          done
      - run: npm run test:integration
